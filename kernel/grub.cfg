# MexaOS GRUB2 Boot Configuration

set timeout=3
set default=0

set menu_color_normal=white/black
set menu_color_highlight=white/indigo

menuentry "MexaOS v2.0 — Intent-Driven OS" {
    multiboot2 /boot/mexaos.bin
    boot
}

menuentry "MexaOS (Debug Mode)" {
    multiboot2 /boot/mexaos.bin debug=1
    boot
}

menuentry "MexaOS (Safe Mode)" {
    multiboot2 /boot/mexaos.bin safe=1
    boot
}

menuentry "System Information" {
    multiboot2 /boot/mexaos.bin info=1
    boot
}
