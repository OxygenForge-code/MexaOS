name: Build MexaOS ISO
on:
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso grub-pc-bin
          sudo tee /usr/local/bin/x86_64-elf-gcc <<< '#!/bin/bash
          gcc -m64 -ffreestanding -nostdlib -nostartfiles "$@"'
          sudo chmod +x /usr/local/bin/x86_64-elf-gcc
          make clean || true; make all || true
      - uses: actions/upload-artifact@v4
        with: { name: MexaOS-ISO, path: build/*.iso }
