name: Build MexaOS ISO
on:
  push: { branches: [main] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm xorriso grub-common grub-pc-bin
          
      - name: Setup cross-compiler stub
        run: |
          sudo tee /usr/local/bin/x86_64-elf-gcc << 'EOF'
          #!/bin/bash
          gcc -m64 -ffreestanding -nostdlib -nostartfiles "$@"
          EOF
          sudo chmod +x /usr/local/bin/x86_64-elf-gcc
          
          sudo tee /usr/local/bin/x86_64-elf-ld << 'EOF'
          #!/bin/bash
          ld "$@"
          EOF
          sudo chmod +x /usr/local/bin/x86_64-elf-ld
          
      - name: Build
        run: |
          make clean
          make all
          
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: MexaOS-ISO
          path: build/*.iso
          
      - name: Upload Disk Image
        uses: actions/upload-artifact@v4
        with:
          name: MexaOS-Disk
          path: build/*.img
